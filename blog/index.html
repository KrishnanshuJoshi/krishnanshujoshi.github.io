    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        :root{
            --bg:#F7F3ED;
            --surface:#EFEAE2;
            --surface2:#E8E1D4;
            --ink:#0A0A0A;
        }
        body{font-family:'Fraunces',serif;background:var(--bg);color:var(--ink);line-height:1.6;}
        
        nav{padding:2rem 5%;display:flex;justify-content:space-between;align-items:center;}
        .logo{font-size:1.1rem;font-style:italic;font-weight:400;}
        nav ul{display:flex;list-style:none;gap:2rem;}
        nav a{color:var(--ink);text-decoration:none;font-size:0.95rem;}
        nav a:hover{opacity:0.7;}
        
        .container{max-width:900px;margin:0 auto;padding:4rem 5%;}
        h1{font-size:3.5rem;font-weight:400;line-height:1.1;margin-bottom:3rem;}
        
        .blog-list{display:flex;flex-direction:column;gap:3rem;}
        .blog-card{border-bottom:1px solid var(--surface2);padding-bottom:2rem;}
        .blog-card:last-child{border-bottom:none;}
        .blog-meta{font-size:0.85rem;color:#666;margin-bottom:0.5rem;}
        .blog-card h2{font-size:2rem;font-weight:500;margin-bottom:0.75rem;}
        .blog-card h2 a{color:var(--ink);text-decoration:none;}
        .blog-card h2 a:hover{opacity:0.7;}
        .blog-excerpt{font-size:1.05rem;color:#333;margin-bottom:1rem;}
        .read-more{color:var(--ink);text-decoration:none;font-size:0.95rem;font-weight:500;}
        .read-more:hover{text-decoration:underline;}
        
        @media (max-width: 768px){
            h1{font-size:2.5rem;}
            .blog-card h2{font-size:1.5rem;}
            nav ul{gap:1rem;}
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">Krishnanshu Joshi</div>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/blog/">Blog</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>Thoughts on finance,<br>fintech & B2B</h1>
        
        <div class="blog-list">
            <article class="blog-card">

                <a href="/blog/the-atonement-of-banking.html" class="read-more">Read article →</a>
            </article>
            
            <!-- More blog posts will be added here -->
        </div>
    </div>
</body>
